<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe für mich</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #fdf6e3 0%, #e3f2fd 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  h1 {
    font-size: 2rem;
    color: #ef6c00;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: #666;
    margin-bottom: 1.5rem;
  }

  button {
    font-family: inherit;
    font-size: 1.4rem;
    border: none;
    border-radius: 16px;
    padding: 1rem 1.5rem;
    cursor: pointer;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.95); }

  .menu-btn {
    display: block;
    width: 100%;
    margin-bottom: 1rem;
    color: #fff;
  }
  .menu-btn.plus        { background: #43a047; }
  .menu-btn.minus       { background: #e53935; }
  .menu-btn.plus-split  { background: #00897b; }
  .menu-btn.minus-split { background: #ef6c00; }
  .menu-btn.mixed       { background: #7b1fa2; }

  .progress {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 1.25rem;
  }

  .dot {
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: bold;
    color: #fff;
  }
  .dot.current { background: #bbdefb; box-shadow: 0 0 0 3px #1e88e5; }
  .dot.correct { background: #43a047; }
  .dot.wrong   { background: #ef6c00; }

  .task {
    font-size: 2rem;
    font-weight: bold;
    color: #333;
    margin: 1rem 0;
  }

  .task-line {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    min-height: 3rem;
  }

  .blank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 3rem;
    height: 3rem;
    padding: 0 0.4rem;
    border: 3px dashed #bbb;
    border-radius: 12px;
    background: #fafafa;
  }
  .blank.active {
    border-style: solid;
    border-color: #1e88e5;
    background: #e3f2fd;
  }
  .blank.done {
    border-style: solid;
    border-color: #43a047;
    background: #e8f5e9;
    color: #2e7d32;
  }
  .blank.error {
    border-style: solid;
    border-color: #e53935;
    background: #ffebee;
    animation: shake 0.3s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .feedback {
    font-size: 1.4rem;
    min-height: 2rem;
    margin-bottom: 0.5rem;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    max-width: 280px;
    margin: 0 auto;
  }
  .numpad button {
    background: #1e88e5;
    color: #fff;
    font-size: 1.6rem;
    font-weight: bold;
    padding: 0.8rem;
    border-radius: 14px;
  }
  .numpad .key-back { background: #90a4ae; }
  .numpad .key-ok   { background: #43a047; }

  .big-emoji { font-size: 4rem; margin: 1rem 0; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <!-- Start menu -->
  <div id="screen-menu">
    <h1>Mathe für mich</h1>
    <p class="subtitle">Was möchtest du üben?</p>
    <button class="menu-btn plus"        onclick="startRound('plus')">➕ Plusaufgaben</button>
    <button class="menu-btn minus"       onclick="startRound('minus')">➖ Minusaufgaben</button>
    <button class="menu-btn plus-split"  onclick="startRound('plusSplit')">➕ Plus mit Zerlegen</button>
    <button class="menu-btn minus-split" onclick="startRound('minusSplit')">➖ Minus mit Zerlegen</button>
    <button class="menu-btn mixed"       onclick="startRound('mixed')">🎲 Gemischt</button>
  </div>

  <!-- Quiz -->
  <div id="screen-quiz" class="hidden">
    <div class="progress" id="progress"></div>
    <div class="task" id="task"></div>
    <div class="feedback" id="feedback"></div>
    <div class="numpad" id="numpad"></div>
  </div>

  <!-- Result -->
  <div id="screen-done" class="hidden">
    <h1>Super gemacht!</h1>
    <div class="big-emoji" id="done-emoji"></div>
    <p class="subtitle" id="done-text"></p>
    <button class="menu-btn mixed" onclick="showMenu()">🔁 Nochmal spielen</button>
  </div>
</div>

<script>
const ROUND_LENGTH = 10;

let mode = 'mixed';
let questionIndex = 0;
let stars = 0;           // tasks solved correctly on the first try
let firstTry = true;     // no wrong entry yet in the current task
let results = [];        // per task: 'correct' | 'wrong' | null
let blanks = [];         // blanks of the current task, in fill order
let blankIndex = 0;      // which blank is active
let entry = '';          // digits typed into the active blank
let locked = false;      // input ignored while transitioning to the next task

const $ = id => document.getElementById(id);

function showScreen(name) {
  for (const s of ['menu', 'quiz', 'done']) {
    $('screen-' + s).classList.toggle('hidden', s !== name);
  }
}

function showMenu() {
  showScreen('menu');
}

function startRound(m) {
  mode = m;
  questionIndex = 0;
  stars = 0;
  results = new Array(ROUND_LENGTH).fill(null);
  showScreen('quiz');
  nextQuestion();
}

function renderProgress() {
  const el = $('progress');
  el.innerHTML = '';
  for (let i = 0; i < ROUND_LENGTH; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (results[i] === 'correct') {
      dot.classList.add('correct');
      dot.textContent = '✓';
    } else if (results[i] === 'wrong') {
      dot.classList.add('wrong');
      dot.textContent = '✗';
    } else if (i === questionIndex - 1) {
      dot.classList.add('current');
    }
    el.appendChild(dot);
  }
}

function randInt(max) {
  return Math.floor(Math.random() * (max + 1));
}

// A task is a list of lines; each line is a list of tokens. A token is
// either static text or a blank ({ value }) the student must fill in.
// All numbers stay within 0–20 and results are never negative.

function makePlainTask(op) {
  let a, b;
  if (op === 'plus') {
    a = randInt(20);
    b = randInt(20 - a);
    return { lines: [[`${a} + ${b} =`, { value: a + b }]] };
  }
  a = randInt(20);
  b = randInt(a);
  return { lines: [[`${a} − ${b} =`, { value: a - b }]] };
}

// Splitting tasks always cross the ten: the second number is split so
// that the first step lands exactly on 10.
function makePlusSplitTask() {
  const a = 2 + randInt(7);              // 2..9
  const c1 = 10 - a;                     // fills a up to 10
  const b = c1 + 1 + randInt(8 - c1);    // c1+1..9, so the rest is >= 1
  const c2 = b - c1;
  return { lines: [
    [`${a} + ${b} = ?`],
    [`${a} +`, { value: c1 }, '+', { value: c2 }],
    ['=', { value: a + b }],
  ] };
}

function makeMinusSplitTask() {
  const a = 11 + randInt(7);             // 11..18
  const c1 = a - 10;                     // brings a down to 10
  const b = c1 + 1 + randInt(8 - c1);    // c1+1..9, so the rest is >= 1
  const c2 = b - c1;
  return { lines: [
    [`${a} − ${b} = ?`],
    [`${a} −`, { value: c1 }, '−', { value: c2 }],
    ['=', { value: a - b }],
  ] };
}

function makeTask() {
  switch (mode) {
    case 'plus':       return makePlainTask('plus');
    case 'minus':      return makePlainTask('minus');
    case 'plusSplit':  return makePlusSplitTask();
    case 'minusSplit': return makeMinusSplitTask();
    default:           return makePlainTask(Math.random() < 0.5 ? 'plus' : 'minus');
  }
}

function renderTask(task) {
  const el = $('task');
  el.innerHTML = '';
  blanks = [];
  for (const line of task.lines) {
    const lineEl = document.createElement('div');
    lineEl.className = 'task-line';
    for (const token of line) {
      if (typeof token === 'string') {
        const span = document.createElement('span');
        span.textContent = token;
        lineEl.appendChild(span);
      } else {
        const blank = document.createElement('span');
        blank.className = 'blank';
        blanks.push({ el: blank, value: token.value });
        lineEl.appendChild(blank);
      }
    }
    el.appendChild(lineEl);
  }
  blankIndex = 0;
  entry = '';
  blanks[0].el.classList.add('active');
}

function activeBlank() {
  return blanks[blankIndex];
}

function onDigit(digit) {
  if (locked || entry.length >= 2) return;
  entry += digit;
  activeBlank().el.textContent = entry;
}

function onBackspace() {
  if (locked) return;
  entry = entry.slice(0, -1);
  activeBlank().el.textContent = entry;
}

function onConfirm() {
  if (locked || entry === '') return;
  const blank = activeBlank();
  if (parseInt(entry, 10) === blank.value) {
    blank.el.classList.remove('active');
    blank.el.classList.add('done');
    entry = '';
    blankIndex++;
    if (blankIndex >= blanks.length) {
      finishTask();
    } else {
      blanks[blankIndex].el.classList.add('active');
      $('feedback').textContent = '';
    }
  } else {
    firstTry = false;
    results[questionIndex - 1] = 'wrong';
    renderProgress();
    $('feedback').textContent = '🤔 Versuch es nochmal!';
    entry = '';
    blank.el.textContent = '';
    blank.el.classList.remove('active');
    blank.el.classList.add('error');
    setTimeout(() => {
      blank.el.classList.remove('error');
      blank.el.classList.add('active');
    }, 400);
  }
}

function finishTask() {
  if (firstTry) {
    stars++;
    results[questionIndex - 1] = 'correct';
  }
  renderProgress();
  $('feedback').textContent = '🎉 Richtig!';
  locked = true;
  setTimeout(nextQuestion, 900);
}

function nextQuestion() {
  locked = false;
  if (questionIndex >= ROUND_LENGTH) {
    finishRound();
    return;
  }
  questionIndex++;
  firstTry = true;
  renderProgress();
  renderTask(makeTask());
  $('feedback').textContent = '';
}

function finishRound() {
  showScreen('done');
  $('done-emoji').textContent = stars >= 9 ? '🏆' : stars >= 6 ? '🌟' : '💪';
  $('done-text').textContent =
    `Du hast ${stars} von ${ROUND_LENGTH} Sternen gesammelt!`;
}

function buildNumpad() {
  const el = $('numpad');
  for (const key of ['1','2','3','4','5','6','7','8','9','⌫','0','✓']) {
    const btn = document.createElement('button');
    btn.textContent = key;
    if (key === '⌫') {
      btn.className = 'key-back';
      btn.onclick = onBackspace;
    } else if (key === '✓') {
      btn.className = 'key-ok';
      btn.onclick = onConfirm;
    } else {
      btn.onclick = () => onDigit(key);
    }
    el.appendChild(btn);
  }
}

buildNumpad();
</script>

</body>
</html>
